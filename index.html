<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>WAY云帖子 · 阿念游戏解说</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-url, url('https://picsum.photos/id/104/1920/1080')) center/cover no-repeat fixed;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', 'PingFang SC', 'Roboto', sans-serif;
            min-height: 100vh;
            padding-bottom: 70px;
        }

        .glass-app {
            max-width: 600px;
            margin: 0 auto;
            padding: 18px 16px 30px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08), 0 1px 2px rgba(255,255,255,0.4) inset;
            transition: all 0.2s ease;
        }

        .hero {
            text-align: center;
            padding: 20px 16px;
            margin-bottom: 24px;
        }
        .hero h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1A2A3A, #2C4A5E);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .hero .welcome-text {
            font-size: 0.9rem;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(4px);
            display: inline-block;
            padding: 8px 20px;
            border-radius: 40px;
            color: #1f2e36;
            font-weight: 500;
            margin-top: 12px;
            line-height: 1.4;
        }

        .user-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }
        .user-info-box {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 20px;
            border-radius: 60px;
            background: rgba(255,255,240,0.5);
            backdrop-filter: blur(8px);
        }
        .logout-btn, .login-btn {
            background: rgba(0,0,0,0.2);
            border: none;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
        }

        .categories-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 28px;
            justify-content: center;
        }
        .cat-item {
            flex: 1;
            min-width: 140px;
            padding: 14px 8px 12px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.15s, background 0.2s;
        }
        .cat-item.active-cat {
            background: rgba(255, 255, 255, 0.55);
            border: 1px solid rgba(255,255,240,0.9);
        }
        .cat-img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 24px;
            margin-bottom: 10px;
            background: rgba(255,255,245,0.5);
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
        .cat-name {
            font-weight: 700;
            font-size: 0.9rem;
            background: rgba(0,0,0,0.2);
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
        }

        .post-area {
            padding: 20px;
            margin-bottom: 28px;
        }
        .post-area h3 {
            font-size: 1.25rem;
            margin-bottom: 12px;
        }
        select, textarea, input {
            width: 100%;
            background: rgba(255,255,245,0.7);
            border: 1px solid rgba(255,255,255,0.8);
            border-radius: 24px;
            padding: 12px 16px;
            font-size: 0.9rem;
            margin-bottom: 12px;
            outline: none;
            font-family: inherit;
        }
        textarea {
            min-height: 80px;
            resize: vertical;
        }
        .post-btn {
            background: #2c5f6e;
            border: none;
            color: white;
            font-weight: 600;
            padding: 12px;
            border-radius: 40px;
            width: 100%;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .post-btn:hover {
            background: #1f4855;
        }

        .posts-feed {
            margin-bottom: 30px;
        }
        .post-card {
            padding: 16px;
            margin-bottom: 14px;
        }
        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }
        .post-cat-tag {
            background: rgba(0,0,0,0.3);
            padding: 2px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
        }
        .post-content {
            margin: 10px 0 12px;
            line-height: 1.4;
            word-break: break-word;
        }
        .post-actions {
            display: flex;
            gap: 24px;
            margin-top: 8px;
        }
        .action-btn {
            background: transparent;
            border: none;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 40px;
            color: #2c3e44;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 600px;
            margin: 0 auto;
            background: rgba(245, 245, 250, 0.7);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 10px 20px 18px;
            border-top: 1px solid rgba(255,255,245,0.8);
            border-radius: 30px 30px 0 0;
            z-index: 100;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: transparent;
            border: none;
            font-size: 0.7rem;
            gap: 4px;
            font-weight: 500;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 30px;
            color: #1f3b46;
        }
        .nav-item.active {
            background: rgba(255,255,245,0.7);
        }
        .nav-icon {
            font-size: 1.4rem;
        }

        .info-section {
            display: flex;
            gap: 16px;
            margin: 20px 0;
        }
        .info-block {
            flex: 1;
            padding: 14px;
            text-align: center;
            cursor: pointer;
        }
        .info-block strong {
            display: block;
            font-size: 1rem;
            margin-bottom: 6px;
        }

        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-card {
            width: 85%;
            max-width: 340px;
            background: rgba(255,255,245,0.85);
            backdrop-filter: blur(24px);
            border-radius: 48px;
            padding: 28px 20px;
            text-align: center;
        }
        .modal-card input {
            margin-bottom: 14px;
        }
        .captcha-box {
            background: #2e4a5e20;
            padding: 12px;
            border-radius: 28px;
            margin: 12px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .captcha-code {
            font-family: monospace;
            font-weight: bold;
            font-size: 1.4rem;
            letter-spacing: 6px;
            background: #1e2f38;
            color: #f0f0e0;
            padding: 6px 12px;
            border-radius: 36px;
        }
        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }
        .modal-buttons button {
            flex: 1;
            padding: 10px;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }
        .error-msg {
            color: #bc3900;
            font-size: 0.7rem;
            margin-top: 6px;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #1f3b46;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="glass-app" id="app">
    <div class="hero glass-card">
        <h1>WAY云帖子</h1>
        <div class="welcome-text">
            🌟 欢迎来到阿念游戏解说的官网帖子<br>
            这里都可以选择你想发布的贴子，主播会给你上电视喔
        </div>
    </div>

    <div class="user-bar">
        <div class="user-info-box glass-card">
            <span id="greetingMsg">未登录</span>
            <button id="authBtn" class="login-btn">登录/注册</button>
        </div>
    </div>

    <div class="categories-grid" id="categoriesContainer"></div>

    <div class="post-area glass-card">
        <h3>📝 发布新帖子</h3>
        <select id="postCategorySelect"></select>
        <textarea id="postContentInput" placeholder="写点什么..."></textarea>
        <button id="publishBtn" class="post-btn">✨ 发布帖子</button>
    </div>

    <div id="postsContainer" class="posts-feed">
        <div class="loading">加载中...</div>
    </div>

    <div class="info-section">
        <div class="info-block glass-card" id="contactBtn">
            <strong>📞 联系我</strong>
            <p>主播阿念 · 商务合作</p>
        </div>
        <div class="info-block glass-card" id="whyWayBtn">
            <strong>✨ 为什么选择WAY？</strong>
            <p>纯净玻璃界面 · 云端记忆</p>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item" data-nav="home"><span class="nav-icon">🏠</span><span>主页</span></button>
        <button class="nav-item" data-nav="info"><span class="nav-icon">❤️💬</span><span>信息</span></button>
        <button class="nav-item" data-nav="profile"><span class="nav-icon">👤</span><span>我的</span></button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // ========== Supabase 配置（请替换成你自己的）==========
    const SUPABASE_URL = 'https://xyibqrwjdmzbvvitkkg.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_xs_8ujkIqefLcvd7XXMN4g_pr0E7...';  // 👈 请把完整密钥填在这里！
    
    // 如果上面的密钥不完整，请手动替换成你复制的那串完整字符
    // ====================================================

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = localStorage.getItem('way_currentUser') || null;

    // 分类数据（固定三个）
    const categories = [
        { id: 'cat_nfs', name: '极品飞车集结', imgUrl: 'https://placehold.co/200x200/e0e7ff/2c3e50?text=NFS' },
        { id: 'cat_mc', name: '我的世界', imgUrl: 'https://placehold.co/200x200/d9f0e0/2c5e3a?text=Minecraft' },
        { id: 'cat_other', name: '其他贴子（日常）', imgUrl: 'https://placehold.co/200x200/ffe0cc/aa6f3c?text=日常' }
    ];

    let currentHomeFilter = 'all';
    let currentNav = 'home';

    // ========== 数据库操作 ==========
    async function loadPosts() {
        const { data, error } = await supabase
            .from('posts')
            .select('*')
            .order('created_at', { ascending: false });
        if (error) {
            console.error('加载帖子失败:', error);
            return [];
        }
        return data || [];
    }

    async function addPost(post) {
        const { data, error } = await supabase
            .from('posts')
            .insert([post])
            .select();
        if (error) {
            console.error('发布失败:', error);
            alert('发布失败：' + error.message);
            return null;
        }
        return data[0];
    }

    async function updatePostLikes(id, newLikes) {
        await supabase.from('posts').update({ likes: newLikes }).eq('id', id);
    }

    async function updatePostComments(id, newComments) {
        await supabase.from('posts').update({ comments: newComments }).eq('id', id);
    }

    async function registerUser(username, password) {
        const { data, error } = await supabase
            .from('users')
            .insert([{ username, password }])
            .select();
        if (error) return { success: false, error: '用户名已存在' };
        return { success: true };
    }

    async function loginUser(username, password) {
        const { data, error } = await supabase
            .from('users')
            .select('*')
            .eq('username', username)
            .eq('password', password);
        if (error || !data || data.length === 0) return false;
        return true;
    }

    // ========== 渲染函数 ==========
    function renderCategories() {
        const container = document.getElementById('categoriesContainer');
        if (!container) return;
        container.innerHTML = '';
        categories.forEach(cat => {
            const card = document.createElement('div');
            card.className = `cat-item glass-card ${currentHomeFilter === cat.id ? 'active-cat' : ''}`;
            const img = document.createElement('img');
            img.src = cat.imgUrl;
            img.alt = cat.name;
            img.className = 'cat-img';
            const span = document.createElement('span');
            span.className = 'cat-name';
            span.innerText = cat.name;
            card.appendChild(img);
            card.appendChild(span);
            card.addEventListener('click', () => {
                currentHomeFilter = cat.id;
                currentNav = 'home';
                renderAllUI();
            });
            container.appendChild(card);
        });
    }

    function renderPostSelect() {
        const select = document.getElementById('postCategorySelect');
        select.innerHTML = '';
        categories.forEach(cat => {
            const option = document.createElement('option');
            option.value = cat.id;
            option.innerText = cat.name;
            select.appendChild(option);
        });
    }

    async function publishPost() {
        if (!currentUser) {
            alert('请先登录');
            openAuthModal();
            return;
        }
        const categoryId = document.getElementById('postCategorySelect').value;
        const content = document.getElementById('postContentInput').value.trim();
        if (!content) {
            alert('内容不能为空');
            return;
        }
        const newPost = {
            author: currentUser,
            category_id: categoryId,
            content: content,
            likes: 0,
            comments: 0
        };
        await addPost(newPost);
        document.getElementById('postContentInput').value = '';
        await renderAllUI();
    }

    async function likePost(postId, currentLikes) {
        if (!currentUser) { alert('请先登录'); openAuthModal(); return; }
        await updatePostLikes(postId, currentLikes + 1);
        await renderAllUI();
    }

    async function commentPost(postId, currentComments) {
        if (!currentUser) { alert('请先登录'); openAuthModal(); return; }
        let msg = prompt('评论内容:');
        if (msg && msg.trim()) {
            await updatePostComments(postId, currentComments + 1);
            await renderAllUI();
            alert('评论成功+1');
        }
    }

    async function renderPosts() {
        const container = document.getElementById('postsContainer');
        const posts = await loadPosts();
        let filteredPosts = posts;
        if (currentHomeFilter !== 'all' && currentNav === 'home') {
            filteredPosts = posts.filter(p => p.category_id === currentHomeFilter);
        } else if (currentNav === 'profile' && currentUser) {
            filteredPosts = posts.filter(p => p.author === currentUser);
        } else if (currentNav === 'profile' && !currentUser) {
            container.innerHTML = `<div class="glass-card" style="padding:20px; text-align:center">登录后查看我的帖子❤️</div>`;
            return;
        }
        if (filteredPosts.length === 0) {
            container.innerHTML = `<div class="glass-card" style="padding:30px; text-align:center">✨ 暂无帖子，发布第一条吧 ✨</div>`;
            return;
        }
        container.innerHTML = '';
        for (const post of filteredPosts) {
            const cat = categories.find(c => c.id === post.category_id);
            const catName = cat ? cat.name : '未知';
            const div = document.createElement('div');
            div.className = 'post-card glass-card';
            div.innerHTML = `
                <div class="post-header"><span class="post-cat-tag"># ${catName}</span><span class="post-author">✍️ ${escapeHtml(post.author)}</span></div>
                <div class="post-content">${escapeHtml(post.content)}</div>
                <div class="post-actions">
                    <button class="action-btn like-btn" data-id="${post.id}" data-likes="${post.likes}">❤️ ${post.likes}</button>
                    <button class="action-btn comment-btn" data-id="${post.id}" data-comments="${post.comments}">💬 ${post.comments}</button>
                </div>
                <div style="font-size:0.6rem; opacity:0.6; margin-top:6px;">${new Date(post.created_at).toLocaleString()}</div>
            `;
            container.appendChild(div);
        }
        document.querySelectorAll('.like-btn').forEach(btn => {
            btn.addEventListener('click', () => likePost(parseInt(btn.dataset.id), parseInt(btn.dataset.likes)));
        });
        document.querySelectorAll('.comment-btn').forEach(btn => {
            btn.addEventListener('click', () => commentPost(parseInt(btn.dataset.id), parseInt(btn.dataset.comments)));
        });
    }

    async function renderInfoPanel() {
        const container = document.getElementById('postsContainer');
        const posts = await loadPosts();
        const totalLikes = posts.reduce((a, b) => a + b.likes, 0);
        const totalComments = posts.reduce((a, b) => a + b.comments, 0);
        let myStats = { likes: 0, comments: 0 };
        if (currentUser) {
            const myPosts = posts.filter(p => p.author === currentUser);
            myStats.likes = myPosts.reduce((a, b) => a + b.likes, 0);
            myStats.comments = myPosts.reduce((a, b) => a + b.comments, 0);
        }
        container.innerHTML = `<div class="info-drawer glass-card"><h3>📊 全局动态</h3><p>🔥 总点赞数: ${totalLikes}</p><p>💬 总评论数: ${totalComments}</p>${currentUser ? `<hr/><h4>👤 ${currentUser} 的数据</h4><p>❤️ 收到点赞: ${myStats.likes}</p><p>🗨️ 收到评论: ${myStats.comments}</p>` : '<p>登录后可查看个人数据~</p>'}</div>`;
    }

    function renderProfile() {
        const container = document.getElementById('postsContainer');
        if (!currentUser) {
            container.innerHTML = `<div class="glass-card" style="padding:28px; text-align:center">🔐 尚未登录<br/><button id="profileAuthBtn" class="post-btn" style="margin-top:12px">立即登录/注册</button></div>`;
            document.getElementById('profileAuthBtn')?.addEventListener('click', () => openAuthModal());
            return;
        }
        container.innerHTML = `<div class="glass-card" style="padding:24px"><h3>🌟 我的云端档案</h3><p>👤 用户名: ${currentUser}</p><button id="myPostFilterBtn" class="post-btn" style="margin-top:12px">查看我的帖子</button></div>`;
        document.getElementById('myPostFilterBtn')?.addEventListener('click', () => { currentNav = 'profile'; renderAllUI(); });
    }

    function setActiveNav(nav) { currentNav = nav; if (nav === 'home') currentHomeFilter = 'all'; renderAllUI(); }

    async function renderAllUI() {
        renderCategories();
        renderPostSelect();
        if (currentNav === 'home') await renderPosts();
        else if (currentNav === 'info') await renderInfoPanel();
        else if (currentNav === 'profile') renderProfile();
        
        const greeting = document.getElementById('greetingMsg');
        const authBtn = document.getElementById('authBtn');
        if (currentUser) {
            greeting.innerText = `☁️ ${currentUser}`;
            authBtn.innerText = '退出';
        } else {
            greeting.innerText = '未登录';
            authBtn.innerText = '登录/注册';
        }
        document.querySelectorAll('.nav-item').forEach(btn => {
            if (btn.dataset.nav === currentNav) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }

    // ========== 人机验证 + 登录注册 ==========
    let currentCaptcha = '';
    function generateCaptcha() { return Math.floor(1000 + Math.random() * 9000).toString(); }
    function refreshCaptcha() { currentCaptcha = generateCaptcha(); return currentCaptcha; }

    function openAuthModal() {
        const modalDiv = document.createElement('div'); modalDiv.className = 'modal';
        let captchaText = refreshCaptcha();
        modalDiv.innerHTML = `<div class="modal-card"><h3>🎫 欢迎 WAY 云帖</h3><input type="text" id="authUsername" placeholder="用户名"><input type="password" id="authPassword" placeholder="密码"><div class="captcha-box"><span class="captcha-code">${captchaText}</span><input type="text" id="captchaInput" placeholder="验证码"><button id="refreshCaptchaBtn">🔄</button></div><div class="modal-buttons"><button id="doLoginBtn">登录</button><button id="doRegBtn">注册</button></div><div id="authErrorMsg" class="error-msg"></div></div>`;
        document.body.appendChild(modalDiv);
        const close = () => modalDiv.remove();
        const checkCaptcha = () => {
            if (modalDiv.querySelector('#captchaInput').value !== currentCaptcha) {
                document.getElementById('authErrorMsg').innerText = '验证码错误';
                return false;
            }
            return true;
        };
        modalDiv.querySelector('#doLoginBtn').onclick = async () => {
            if (!checkCaptcha()) return;
            const u = modalDiv.querySelector('#authUsername').value.trim();
            const p = modalDiv.querySelector('#authPassword').value;
            const success = await loginUser(u, p);
            if (success) { currentUser = u; localStorage.setItem('way_currentUser', u); close(); await renderAllUI(); }
            else document.getElementById('authErrorMsg').innerText = '用户名或密码错误';
        };
        modalDiv.querySelector('#doRegBtn').onclick = async () => {
            if (!checkCaptcha()) return;
            const u = modalDiv.querySelector('#authUsername').value.trim();
            const p = modalDiv.querySelector('#authPassword').value;
            if (!u || !p) { document.getElementById('authErrorMsg').innerText = '用户名/密码不能为空'; return; }
            const result = await registerUser(u, p);
            if (result.success) { currentUser = u; localStorage.setItem('way_currentUser', u); close(); await renderAllUI(); }
            else document.getElementById('authErrorMsg').innerText = result.error;
        };
        modalDiv.querySelector('#refreshCaptchaBtn').onclick = () => {
            const newCode = refreshCaptcha();
            modalDiv.querySelector('.captcha-code').innerText = newCode;
            modalDiv.querySelector('#captchaInput').value = '';
        };
        modalDiv.addEventListener('click', (e) => { if (e.target === modalDiv) close(); });
    }

    // ========== 事件绑定 ==========
    document.getElementById('publishBtn').addEventListener('click', publishPost);
    document.getElementById('authBtn').addEventListener('click', () => {
        if (currentUser) { currentUser = null; localStorage.removeItem('way_currentUser'); renderAllUI(); }
        else openAuthModal();
    });
    document.querySelectorAll('.nav-item').forEach(btn => btn.addEventListener('click', () => setActiveNav(btn.dataset.nav)));
